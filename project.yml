name: Clicker
options:
  bundleIdPrefix: com.deitel
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

# ----------------------------------------------------------------------------
# Settings applied to every target. Signing is configured for team W7Q885Q59C
# (Joshua Deitel) with the com.deitel bundle prefix. Simulator builds work
# without an account: signing is disabled for the simulator SDK only, so
# `xcodebuild ... build` is green with placeholder ids, while device builds
# sign normally.
# ----------------------------------------------------------------------------
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C        # Joshua Deitel — same team as Pulse/Friction
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"                 # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO

targets:
  Clicker:
    type: application
    platform: iOS
    sources:
      - path: Clicker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deitel.clicker
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Custom Info.plist keys (merged with the GENERATE_INFOPLIST_FILE output).
    # NOTE: v1 ships WITHOUT the com.apple.developer.networking.multicast
    # entitlement — no SSDP. Discovery is Bonjour + manual IP only.
    info:
      path: Clicker/Info.plist
      properties:
        NSLocalNetworkUsageDescription: "Clicker finds and controls TVs on your Wi-Fi network. Nothing leaves your home network."
        NSBonjourServices:
          - _airplay._tcp
          - _googlecast._tcp
          - _lg-smart-device._tcp
          - _samsungmsf._tcp

schemes:
  Clicker:
    build:
      targets:
        Clicker: all
    run:
      config: Debug
      # Local StoreKit testing config so the paywall works in the simulator.
      storeKitConfiguration: Clicker.storekit
    test:
      config: Debug
